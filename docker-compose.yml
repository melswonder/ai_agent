services:
  postgres:
    image: postgres:16-alpine
    container_name: spotify-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spotify_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spotify_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: spotify-chat-python-backend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/spotify_agent?schema=public
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./.env.local:/app/.env.local

volumes:
  postgres_data:
